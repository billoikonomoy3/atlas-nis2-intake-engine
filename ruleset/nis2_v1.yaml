# Atlas NIS2 ruleset — versioned single source of truth for the deterministic engine.
#
# This file is DATA. The engine (atlas/engine/*) reads every threshold, weight and
# criterion from here and hardcodes none of them. Its sha256 is embedded in every
# exported snapshot so a verdict is re-derivable from the ruleset that produced it.
#
# TWO KINDS OF CONTENT, kept visibly separate:
#   * `statutory:` — what THE LAW determines (scope, class, size, the 2003/361/EC
#     thresholds, the Art 3 / Art 2(2) overrides). These carry legal force.
#   * `heuristic_weights:` / `baseline:` / `maturity_ladder:` — what OUR HEURISTIC
#     suggests (proportionality score, tier, required rung, maturity rungs). These
#     are consulting conventions with NO statutory force and are tunable. NIS2
#     prescribes no numeric maturity scale; a rung is never a safe harbour.
#
# COPYRIGHT: ISO/IEC 27001:2022 control TEXT is never reproduced. Each criterion's
# `iso_clauses` is a reference-only list of CLAUSE NUMBERS (a licensed crosswalk
# pointer). Public criteria are keyed to paraphrased NIS2 prose + NIST CSF 2.0 IDs.

ruleset_version: "nis2_v1"
ruleset_date: "2026-06-25"

copyright_note: >-
  ISO/IEC 27001:2022 control text is copyright of ISO and is not reproduced.
  Public criteria are keyed to NIS2 (paraphrased EU law) and NIST CSF 2.0 (public
  domain). ISO is referenced by clause number only as a licensed internal
  crosswalk; resolve the numbers against your own licensed copy.

# ===========================================================================
# STATUTORY — the law determines.  statutory: true
# ===========================================================================
statutory:

  # Commission Recommendation 2003/361/EC.
  # Staff is a HARD CEILING tested inclusively (>=). The two financial figures are
  # a SINGLE limb read in the entity's favour: breached only by exceeding BOTH
  # turnover AND balance, tested strictly (>).
  size_thresholds:
    medium_staff: 50
    medium_turnover_eur: 10000000
    medium_balance_eur: 10000000
    large_staff: 250
    large_turnover_eur: 50000000
    large_balance_eur: 43000000

  # Ordering used by the override engine — an override can only RAISE the class.
  class_rank:
    out_of_scope: 0
    deferred_designation: 0
    important: 1
    essential: 2

  # Article 6 / Reg 2003/361/EC group-link thresholds (statutory, oracle-pinned):
  # control/linked above linked_min_pct; partner from partner_min_pct..linked_min_pct.
  group_links:
    linked_min_pct: 50    # holding_pct > this (strict) OR control=True -> linked (100%)
    partner_min_pct: 25   # holding_pct >= this -> partner (pro-rata); below -> autonomous (0)

  # NIS2 Annex I (high-criticality) and Annex II (other-critical) — top-level
  # groupings. VERIFY against the official Annex text before reliance.
  annex_i_sectors:
    - Energy
    - Transport
    - Banking
    - Financial market infrastructures
    - Health
    - Drinking water
    - Waste water
    - Digital infrastructure
    - ICT service management (B2B)
    - Public administration
    - Space
  annex_ii_sectors:
    - Postal and courier services
    - Waste management
    - Manufacture, production and distribution of chemicals
    - Production, processing and distribution of food
    - Manufacturing
    - Digital providers
    - Research

  # Article 3 / Article 2(2) special-entity flags.
  special_flags:
    # Art 3 — essential regardless of size.
    size_exempt_essential: [qtsp, tld, dns]
    # Art 3 — essential ONLY if the size band is medium/large (below-medium NOT rescued).
    ecomms: ecomms
    # Art 2(2)/Art 3 — public administration in scope regardless of size
    # (sub-medium essential class is transposition-dependent -> ASSUMPTION flag).
    public_admin: [public_admin_central, public_admin_local]

# ===========================================================================
# HEURISTIC PROPORTIONALITY — our heuristic suggests.  statutory: false
# NO STATUTORY FORCE. Tunable. Every weight's justification is an open TODO for a
# human to fill in (see README "Open TODOs"). Do NOT treat as a legal threshold.
# ===========================================================================
heuristic_weights:
  _disclaimer: >-
    These weights are a transparent consulting heuristic with NO statutory force.
    NIS2 Art 21(1) is outcomes-based ("appropriate and proportionate"); this score
    informs, but never replaces, that human judgment. Each weight below needs a
    documented rationale (open TODO).

  # tier name, inclusive low, inclusive high
  tiers:
    - [Foundational, 0, 39]
    - [Standard, 40, 59]
    - [Enhanced, 60, 79]
    - [Critical, 80, 100]

  tier_expectation:
    Foundational: "Baseline hygiene; lightweight self-attestation + evidence sampling."
    Standard: "Established documented programme; design review + operating sampling."
    Enhanced: "Mature risk-driven programme; full controls audit across the six CSF functions."
    Critical: "Maximal rigor for systemic/sole-national providers; in-depth audit + independent technical & resilience validation."

  size_points: {large: 25, medium: 14, below_medium: 6}
  class_points: {essential: 25, important: 12, out_of_scope: 0, deferred_designation: 0}
  annex_points: {I: 15, II: 8, none: 0}
  xborder_points: {systemic: 15, sole_national: 15, cross_border: 9, none: 0}
  supply_points: {high: 5, moderate: 3, low: 0}
  special_entity_points: 5

  # footprint(g,e) = max(G(g), E(e)); each is an ordered (>=threshold -> points) ladder.
  footprint:
    geographies: [[7, 10], [4, 7], [2, 4]]
    entities: [[11, 10], [5, 7], [2, 4]]

  # Score floors (still heuristic): a floor only RAISES the score.
  floors:
    essential_min: 60        # essential -> at least Enhanced
    systemic_min: 80         # systemic / sole_national -> at least Critical

# ===========================================================================
# BASELINE + MATURITY — our heuristic suggests.  statutory: false
# ===========================================================================
baseline:
  # Required maturity rung per proportionality tier (monotonic). Note: an in-scope
  # *important* entity can land at Foundational -> required rung L1. That is a
  # TUNABLE POLICY DECISION, surfaced (not silently "corrected") — see README.
  required_by_tier: {Foundational: 1, Standard: 2, Enhanced: 3, Critical: 4}

  # Controls whose TOP rungs legitimately need evidence the control actually RAN
  # (an evidence-sequencing flag, never a legal pass/fail gate). Verified partition
  # over the 16 ids — disjoint from the 6 that may reach L3 on design alone.
  operating_critical:
    - RM-21B-01
    - RM-21C-01
    - RM-21E-01
    - RM-21F-01
    - RM-21G-01
    - RM-21I-01
    - RM-21J-01
    - REP-23-01
    - REP-23-02
    - REP-23-04

# 0..4 maturity ladder (CMMI / NIST-CSF-tier flavoured consulting convention).
maturity_ladder:
  - [0, "None", "No credible design evidence; the control as written does not exist."]
  - [1, "Initial / ad hoc", "Partial design only; documented control incomplete, practice ad hoc."]
  - [2, "Repeatable (documented)", "Design complete on paper, but no/insufficient proof it ran over the period."]
  - [3, "Defined (operating)", "Complete design plus substantive operating evidence over the window, not yet measured on a cadence."]
  - [4, "Managed / measured", "Complete design, strong operating evidence, and active monitoring with metrics."]

# Evidence completeness thresholds feeding the ladder (fractions in [0,1]).
maturity_thresholds:
  design_min_for_l1: 0.20    # design < this -> L0
  design_complete: 1.0       # design < this -> capped at L1
  operating_min_for_l3: 0.50 # complete design but operating < this -> L2
  operating_strong: 0.80     # operating >= this AND monitored -> L4 (else L3)

# ===========================================================================
# VETO (DISQUALIFYING) FINDINGS — our heuristic suggests.  statutory: false
# ---------------------------------------------------------------------------
# The maturity rung credits whether a control is DOCUMENTED. A veto fires when a
# control's own cited evidence contains a clause whose CONTENT defeats the control
# outcome (presence != conformance). Pure deterministic code (atlas/engine/veto.py)
# evaluates these over the cited facts — no model is involved. Each rule names the
# NIS2 reference it DEFEATS and a short rationale, surfaced on the Finding so a reader
# sees WHY the control was capped. A live veto caps the achieved rung at L1 and the
# status reads "vetoed" (never "meets"). Adding a rule is a YAML edit, not a code change.
#
# These remain a TUNABLE heuristic. NIS2 Art 21(1) is outcomes-based; a rung — or a
# veto — is never a safe harbour. Matcher fields per rule:
#   control_id        which control the veto can disqualify
#   defeats_ref       the NIS2 article the clause defeats (used in the surfaced reason)
#   context_all       regexes that must ALL appear in one cited clause to scope the rule
#   max_window_hours  optional: the clause also fires only if it states a window > this
#                     many hours (durations are parsed from the quote in pure code)
#   rationale         the human-readable "why this disqualifies" shown on the Finding
# ===========================================================================
vetoes:
  - id: "VETO-RM21D-01-SUPPLIER-NOTIF-WINDOW"
    control_id: RM-21D-01
    defeats_ref: "Art 23(4)(a)"     # the 24h early-warning cascade the clause breaks
    max_window_hours: 72            # Art 23 outer bound — notification within 72h
    context_all:                    # ALL must appear in the SAME cited clause
      - 'suppl|third[\s-]?part|vendor|service provider|sub-?process|processor'
      - 'notif|inform|report|breach|incident|disclos'
    rationale: >-
      A supplier incident-notification window longer than the entity's own Art 23
      cascade (early warning <=24h, notification <=72h) leaves the entity structurally
      unable to meet its statutory reporting duty: the clause defeats supply-chain
      security rather than evidencing it. Documenting such a window is a disqualifying
      defect, not a control. Tighten the contractual window to feed the 24h/72h cascade.

